# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.enable_provider_errors: '%env(bool:ENABLE_PROVIDER_ERRORS)%'
    campaign.active: '%env(bool:CAMPAIGN_ACTIVE)%'
    campaign.discount_rate: '%env(float:CAMPAIGN_DISCOUNT_RATE)%'
    app.internal_base_url: '%env(APP_INTERNAL_BASE_URL)%'
    provider.a.url: '%env(PROVIDER_A_URL)%'
    provider.b.url: '%env(PROVIDER_B_URL)%'
    provider.c.url: '%env(PROVIDER_C_URL)%'
    provider.timeout: '%env(int:PROVIDER_TIMEOUT)%'

services:
    monolog.handler.stream:
        class: Monolog\Handler\StreamHandler
        arguments:
            $stream: '%kernel.project_dir%/var/log/%kernel.environment%.log'
            $level: !php/const Monolog\Level::Debug

    Psr\Log\LoggerInterface:
        class: Monolog\Logger
        arguments:
            $name: 'app'
            $handlers: ['@monolog.handler.stream']

    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # ==========================================
    # Provider Simulators (mock APIs)
    # ==========================================
    App\Controller\Provider\ProviderASimulator:
        arguments:
            $enableProviderErrors: '%app.enable_provider_errors%'

    App\Controller\Provider\ProviderBSimulator:
        arguments:
            $enableProviderErrors: '%app.enable_provider_errors%'

    App\Controller\Provider\ProviderCSimulator:
        arguments:
            $enableProviderErrors: '%app.enable_provider_errors%'

    # ==========================================
    # Campaign
    # ==========================================
    App\Service\Campaign\CampaignService:
        arguments:
            $campaignActive: '%campaign.active%'
            $discountRate: '%campaign.discount_rate%'

    # ==========================================
    # HTTP Client for providers (internal sub-requests when URL is localhost)
    # ==========================================
    App\HttpClient\InternalHttpClient:
        arguments:
            $realClient: '@http_client'
            $kernel: '@kernel'
            $internalBaseUrl: '%app.internal_base_url%'

    # ==========================================
    # Provider Services (implementan ProviderInterface)
    # ==========================================
    App\Service\Provider\ProviderAService:
        arguments:
            $httpClient: '@App\HttpClient\InternalHttpClient'
            $url: '%provider.a.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    App\Service\Provider\ProviderBService:
        arguments:
            $httpClient: '@App\HttpClient\InternalHttpClient'
            $url: '%provider.b.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    App\Service\Provider\ProviderCService:
        arguments:
            $httpClient: '@App\HttpClient\InternalHttpClient'
            $url: '%provider.c.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    # ==========================================
    # QuoteComparisonService (orquestador principal)
    # ==========================================
    App\Service\Quote\QuoteComparisonService:
        arguments:
            $providers: !tagged_iterator 'app.provider'
            $httpClient: '@App\HttpClient\InternalHttpClient'
            $providerTimeout: '%provider.timeout%'

    # ==========================================
    # Exception Subscriber
    # ==========================================
    App\EventSubscriber\ExceptionSubscriber:
        arguments:
            $environment: '%kernel.environment%'
