# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    campaign.active: '%env(bool:CAMPAIGN_ACTIVE)%'
    campaign.discount_rate: 0.05
    provider.a.url: '%env(PROVIDER_A_URL)%'
    provider.b.url: '%env(PROVIDER_B_URL)%'
    provider.c.url: '%env(PROVIDER_C_URL)%'
    provider.timeout: '%env(int:PROVIDER_TIMEOUT)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # ==========================================
    # Campaign
    # ==========================================
    App\Service\Campaign\CampaignService:
        arguments:
            $campaignActive: '%campaign.active%'
            $discountRate: '%campaign.discount_rate%'

    # ==========================================
    # Provider Clients (implementan ProviderInterface)
    # ==========================================
    App\Provider\ProviderA\ProviderAClient:
        arguments:
            $url: '%provider.a.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    App\Provider\ProviderB\ProviderBClient:
        arguments:
            $url: '%provider.b.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    App\Provider\ProviderC\ProviderCClient:
        arguments:
            $url: '%provider.c.url%'
            $timeout: '%provider.timeout%'
        tags: ['app.provider']

    # ==========================================
    # QuoteComparisonService (orquestador principal)
    # ==========================================
    App\Service\QuoteComparisonService:
        arguments:
            $providers: !tagged_iterator 'app.provider'

    # ==========================================
    # Exception Subscriber
    # ==========================================
    App\EventSubscriber\ExceptionSubscriber:
        arguments:
            $environment: '%kernel.environment%'
