# Monolog configuration for logging
# Senior Requirement: Logging or minimal monitoring

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

            # Dedicated channel for provider communication
            provider:
                type: stream
                path: "%kernel.logs_dir%/provider.log"
                level: info
                channels: ["provider"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [400, 404, 405]
                buffer_size: 50
            nested:
                type: stream
                path: php://stderr
                level: info
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]

            # Dedicated channel for provider communication
            provider:
                type: stream
                path: php://stderr
                level: warning
                channels: ["provider"]
                formatter: monolog.formatter.json
