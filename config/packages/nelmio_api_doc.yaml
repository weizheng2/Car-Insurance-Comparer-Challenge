# NelmioApiDocBundle configuration
# Provides OpenAPI/Swagger documentation for the API

nelmio_api_doc:
    documentation:
        info:
            title: 'CHECK24 Insurance Quote Comparison API'
            description: |
                API for comparing car insurance quotes from multiple providers.
                
                ## Features
                - Compare quotes from 3 insurance providers (A, B, C)
                - Automatic campaign discount application (5% when active)
                - Parallel provider queries for optimal performance
                - Graceful degradation when providers fail
                
                ## Provider Characteristics
                | Provider | Format | Response Time | Reliability |
                |----------|--------|---------------|-------------|
                | A | JSON | ~2s | 90% |
                | B | XML | ~5s | 99% |
                | C | CSV | ~3s | 95% |
                
                ## Campaign
                When active, CHECK24 covers 5% of the insurance price.
                Campaign status is included in the /calculate response.
            version: '1.0.0'
            contact:
                name: 'CHECK24 API Support'
                email: 'api-support@check24.de'
        servers:
            - url: 'http://localhost:8080'
              description: 'Local development server'
        tags:
            - name: 'Quote Comparison'
              description: 'Main API endpoints for comparing insurance quotes'
            - name: 'Provider Simulation'
              description: 'Simulated provider endpoints (for testing/demo)'
            - name: 'System'
              description: 'System health and status endpoints'
    areas:
        path_patterns:
            - ^/api(?!/doc)  # All /api paths except /api/doc
