services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coding-challenge
    ports:
      - "8080:80"
    volumes:
      # Don't mount the entire directory in development
      - ./src:/var/www/html/src
      - ./config:/var/www/html/config
      - ./public:/var/www/html/public
      # Keep these as named volumes
      - vendor:/var/www/html/vendor
      - var:/var/www/html/var
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      CAMPAIGN_ACTIVE: 'true'
      APP_INTERNAL_BASE_URL: 'http://localhost'
      PROVIDER_A_URL: 'http://localhost/api/provider-a/quote'
      PROVIDER_B_URL: 'http://localhost/api/provider-b/quote'
      PROVIDER_C_URL: 'http://localhost/api/provider-c/quote'
      PROVIDER_TIMEOUT: 10
    networks:
      - coding-challenge-network

networks:
  coding-challenge-network:
    driver: bridge

volumes:
  vendor:
  var: